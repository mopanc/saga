version: 2

project_name: saga

before:
  hooks:
    - go mod tidy

builds:
  - id: saga
    main: ./cmd/saga
    binary: saga
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/mopanc/saga/internal/saga.Version={{.Tag}}

archives:
  - id: saga
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos
      {{- else }}{{ .Os }}{{ end }}_
      {{- .Arch }}
    files:
      - LICENSE
      - README.md
      - CONTRIBUTING.md
      - SECURITY.md
      - CODE_OF_CONDUCT.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github-native
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^chore\\(deps\\):"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: mopanc
    name: saga
  draft: false
  prerelease: auto
  mode: append
  header: |
    ## Saga {{ .Tag }}

    Topic-grained RAG memory layer for AI coding agents.
  footer: |
    ---

    **Full changelog:** https://github.com/mopanc/saga/compare/{{ .PreviousTag }}...{{ .Tag }}

