version: 2

project_name: saga

before:
  hooks:
    - go mod tidy

builds:
  - id: saga
    main: ./cmd/saga
    binary: saga
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/mopanc/saga/internal/saga.Version={{.Version}}

archives:
  - id: saga
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos
      {{- else }}{{ .Os }}{{ end }}_
      {{- .Arch }}
    files:
      - LICENSE
      - README.md
      - CONTRIBUTING.md
      - SECURITY.md
      - CODE_OF_CONDUCT.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# CycloneDX SBOM per archive. Requires `syft` on the runner — the release
# workflow installs it via anchore/sbom-action before goreleaser runs.
sboms:
  - id: archive
    artifacts: archive
    documents:
      - "${artifact}.sbom.cdx.json"
    cmd: syft
    args:
      - "$artifact"
      - "--output"
      - "cyclonedx-json=$document"

# Cosign keyless signing of the checksums manifest via the OIDC ambient
# identity of the GitHub Actions runner. Verifying:
#
#   cosign verify-blob \
#     --certificate-identity-regexp 'https://github.com/mopanc/saga/' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --certificate checksums.txt.pem \
#     --signature checksums.txt.sig \
#     checksums.txt
signs:
  - id: checksums-keyless
    cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    artifacts: checksum
    output: true

snapshot:
  # The previous template `{{ incpatch .Version }}-snapshot` requires .Version
  # to be valid SemVer. Until we cut our first SemVer tag (v1.0.0-beta.1),
  # the only tag in the repo is `archive/typescript-baseline-2026` (the TS
  # prototype baseline preserved across the Go pivot), and `incpatch` blows
  # up on it, breaking every PR's Snapshot build. Use a fixed pre-release
  # version with the short commit instead — valid SemVer, deterministic, and
  # tag-independent.
  version_template: "0.0.0-snapshot-{{ .ShortCommit }}"

changelog:
  use: github-native
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^chore\\(deps\\):"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: mopanc
    name: saga
  draft: false
  prerelease: auto
  mode: append
  header: |
    ## Saga {{ .Tag }}

    Topic-grained RAG memory layer for AI coding agents.
  footer: |
    ---

    **Full changelog:** https://github.com/mopanc/saga/compare/{{ .PreviousTag }}...{{ .Tag }}

