name: CodeQL

on:
  push:
    branches: [main, "pivot/v2-go"]
  pull_request:
    branches: [main, "pivot/v2-go"]
  # Weekly cron disabled while repo is private — code scanning isn't
  # available on free private repos, so the cron just consumes minutes
  # for nothing. Phase 8 (going public) re-enables this:
  #   schedule:
  #     - cron: "23 4 * * 1" # Monday 04:23 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    # CodeQL upload requires code scanning enabled in repo settings.
    # On private repos this needs GitHub Advanced Security (paid). Skip
    # while private; will start running automatically once Phase 8 makes
    # the repo public (code scanning is free for public repos).
    if: ${{ !github.event.repository.private }}
    name: Analyze (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-and-quality

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
