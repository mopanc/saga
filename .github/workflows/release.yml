name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  # id-token: write is required for Cosign keyless signing via the OIDC
  # ambient identity of this runner. Without it, `cosign sign-blob` fails
  # to fetch a Fulcio certificate.
  id-token: write

jobs:
  goreleaser:
    name: Release via goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0

      - name: Install cosign (release signing)
        uses: sigstore/cosign-installer@v3

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_GITHUB_TOKEN must be set as a repository secret
          # before the brew formula publish is enabled in .goreleaser.yaml.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
